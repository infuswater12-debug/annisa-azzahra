<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <!-- Menghubungkan 1 file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="dashboard">
        <!-- Bagian Greeting -->
        <header class="greeting-section card">
            <button id="theme-toggle">🌙 Toggle Dark Mode</button>
            <h1 id="time">00:00:00</h1>
            <h3 id="date">Day, Month DD, YYYY</h3>
            <h2 id="greeting">Good Morning</h2>
        </header>
        
        <div class="main-grid">
            <!-- Bagian Focus Timer -->
            <section class="timer-section card">
                <h2>Focus Timer</h2>
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="start-timer">Start</button>
                    <button id="stop-timer">Stop</button>
                    <button id="reset-timer">Reset</button>
                </div>
            </section>

            <!-- Bagian Tasks (To-Do List) -->
            <section class="tasks-section card">
                <h2>Tasks</h2>
                <div class="task-input">
                    <input type="text" id="task-input" placeholder="Add a new task...">
                    <button id="add-task-btn">Add</button>
                </div>
                <div class="sort-controls">
                    <button id="sort-tasks-btn">Sort Tasks (A-Z)</button>
                </div>
                <ul id="task-list"></ul>
            </section>

            <!-- Bagian Quick Links -->
            <section class="links-section card">
                <h2>Quick Links</h2>
                <div class="link-input">
                    <input type="text" id="link-name" placeholder="Link name">
                    <input type="url" id="link-url" placeholder="URL (misal: google.com)">
                    <button id="add-link-btn">Add Link</button>
                </div>
                <div id="links-container" class="links-container"></div>
            </section>
        </div>
    </div>
    <!-- Menghubungkan 1 file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
